<script>

const SUPABASE_URL = 'https://iilefvoxigwozzbzgdzb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpbGVmdm94aWd3b3p6YnpnZHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MzE4MTAsImV4cCI6MjA3ODIwNzgxMH0.NK5fR9dsYMlweLAICf4ZWIUVcusho1z3kW0AAfzXwqc';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// VARIABLES GLOBALES
// ============================================
let lat = null;
let lon = null;
let mediaFile = null;
let audioFile = null;  // ← NUEVA: archivo de audio separado
let mediaType = 'foto'; // 'foto' o 'video'

// ============================================
// SELECTOR DE TIPO DE MEDIA
// ============================================
document.querySelectorAll('.media-type-btn').forEach(btn => {
  btn.addEventListener('click', function() {

    // Activar botón visual
    document.querySelectorAll('.media-type-btn').forEach(b => b.classList.remove('active'));

mediaFile = null;

} else {

  input.removeAttribute('capture'); // evita conflicto
}

    // 🔥 ABRIR CÁMARA / ARCHIVO DIRECTO
    input.click();

    // Limpiar preview anterior
   const preview = document.getElementById('mediaPreview');

// SOLO limpiar si NO hay audio cargado
if (!mediaFile || mediaType !== 'audio') {
  preview.style.display = 'none';
  preview.innerHTML = '';
  mediaFile = null;
}

  });
});

// ============================================
// PREVIEW DE FOTO/VIDEO
// ============================================
document.getElementById('mediaInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  mediaFile = file;
  const preview = document.getElementById('mediaPreview');
  const reader = new FileReader();

  reader.onload = function(event) {
    if (file.type.startsWith('image/')) {
      preview.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
    } else if (file.type.startsWith('video/')) {
      preview.innerHTML = `<video controls src="${event.target.result}"></video>`;
    }
    preview.style.display = 'block';
  };

  reader.readAsDataURL(file);
});

// ============================================
// OBTENER UBICACIÓN GPS
// ============================================
function obtenerUbicacion(){
  const info = document.getElementById('ubicacionInfo');
  info.style.display = 'block';
  info.innerHTML = '🔄 Buscando ubicación precisa...';

  let mejorPrecision = Infinity;
  let mejorLat = null;
  let mejorLon = null;

  const watchId = navigator.geolocation.watchPosition(
    (position) => {

      const accuracy = position.coords.accuracy;

      // Guardar la mejor ubicación encontrada
      if (accuracy < mejorPrecision) {
        mejorPrecision = accuracy;
        mejorLat = position.coords.latitude;
        mejorLon = position.coords.longitude;
      }

      // Mostrar en pantalla
      info.innerHTML = `
        📡 Mejorando precisión...<br>
        Precisión: ${accuracy.toFixed(0)} metros<br><br>
        Lat: ${position.coords.latitude.toFixed(6)}<br>
        Lon: ${position.coords.longitude.toFixed(6)}
      `;

      // Si ya es buena precisión, cortar
      if (accuracy < 15) {
        finalizarUbicacion();
      }

    },
    (error) => {
      info.innerHTML = "❌ No se pudo obtener ubicación";
      alert("Error obteniendo ubicación");
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 20000
    }
  );

  function finalizarUbicacion() {
    navigator.geolocation.clearWatch(watchId);

    lat = mejorLat;
    lon = mejorLon;

    info.innerHTML = `
      ✅ Ubicación precisa obtenida<br>
      Precisión: ${mejorPrecision.toFixed(0)} metros<br><br>
      Lat: ${lat.toFixed(6)}<br>
      Lon: ${lon.toFixed(6)}
    `;
  }

  // Backup: cortar a los 10 segundos sí o sí
  setTimeout(() => {
    if (mejorLat !== null) {
      finalizarUbicacion();
    }
  }, 10000);
}

// ============================================
// MOSTRAR ALERTAS
// ============================================
function mostrarAlerta(mensaje, tipo) {
  const alert = document.getElementById('alert');
  alert.className = `alert alert-${tipo}`;
  alert.textContent = mensaje;
  alert.style.display = 'block';
  
  setTimeout(() => {
    alert.style.display = 'none';
  }, 5000);
}

// ============================================
// ENVIAR REPORTE
// ============================================
document.getElementById('reporteForm').addEventListener('submit', async function(e) {
  e.preventDefault();

const descripcion = document.getElementById('descripcion').value;

if (!descripcion && !mediaFile && !audioFile) {
  mostrarAlerta('⚠️ Escribí una descripción, adjuntá foto/video o grabá audio', 'error');
  return;
}

  // Validaciones
  if (!lat || !lon) {
    mostrarAlerta('⚠️ Por favor obtené tu ubicación primero', 'error');
    return;
  }

  const btnSubmit = document.getElementById('btnSubmit');
  const loading = document.getElementById('loading');

  btnSubmit.disabled = true;
  loading.style.display = 'block';

  
try {
  let mediaUrl = null;
  let audioUrl = null;

  // ============================================
  // SUBIR FOTO/VIDEO SI HAY
  // ============================================
  if (mediaFile) {
    const timestamp = Date.now();
    const extension = mediaFile.name.split('.').pop();
    const fileName = `${mediaType}_${timestamp}.${extension}`;
    const filePath = `reportes/${fileName}`;

    const { data: uploadData, error: uploadError } = await supabaseClient.storage
      .from('fauna-media')
      .upload(filePath, mediaFile);

    if (uploadError) throw uploadError;

    const { data: urlData } = supabaseClient.storage
      .from('fauna-media')
      .getPublicUrl(filePath);

    mediaUrl = urlData.publicUrl;
  }

  // ============================================
  // SUBIR AUDIO SI HAY
  // ============================================
  if (audioFile) {
    const timestamp = Date.now();
    const fileName = `audio_${timestamp}.webm`;
    const filePath = `reportes/${fileName}`;

    const { data: uploadData, error: uploadError } = await supabaseClient.storage
      .from('fauna-media')
      .upload(filePath, audioFile);

    if (uploadError) throw uploadError;

    const { data: urlData } = supabaseClient.storage
      .from('fauna-media')
      .getPublicUrl(filePath);

    audioUrl = urlData.publicUrl;
  }

    // ============================================
    // GUARDAR REPORTE EN LA BASE DE DATOS
    // ============================================
const { data, error } = await supabaseClient
  .from('reportes-fauna')
  .insert([
    {
      tipo_animal: document.getElementById('tipoAnimal').value,
      descripcion: document.getElementById('descripcion').value,
      urgencia: document.getElementById('urgencia').value,
      nombre_reportante: document.getElementById('nombre').value || null,
      telefono: document.getElementById('telefono').value || null,
      lat: lat,
      lon: lon,
      media_url: mediaUrl,
      audio_url: audioUrl,  // ← NUEVO CAMPO
      media_tipo: mediaType || null,
      estado: 'pendiente',
      fecha: new Date().toISOString()
    }
  ])
   .select(); // 👈 ESTO ES CLAVE;

if (error) {
  alert("Error al enviar reporte");
  return;
}

// 👇 AGARRA EL ID DEL REPORTE
const idReporte = data[0].id;

// 👇 LO GUARDA EN EL CELULAR
localStorage.setItem("miReporteId", idReporte);

console.log("ID guardado:", idReporte);

    // ============================================
    // ÉXITO
    // ============================================
    mostrarAlerta('✅ ¡Reporte enviado correctamente! Guardafauna lo recibirá pronto.', 'success');
    
      // Limpiar formulario
	document.getElementById('reporteForm').reset();
	document.getElementById('mediaPreview').style.display = 'none';
	document.getElementById('ubicacionInfo').style.display = 'none';
	lat = null;
	lon = null;
	mediaFile = null;
	audioFile = null;  // ← Limpiar audio también

    const btn = document.querySelector('.btn-audio');
btn.textContent = "🎤 Grabar Audio (OPCIONAL)";
btn.style.background = "#4CAF50";

    
   
    
  } catch (error) {
    console.error('Error:', error);
    mostrarAlerta('❌ Error al enviar: ' + error.message, 'error');
  } finally {
    btnSubmit.disabled = false;
    loading.style.display = 'none';
  }
});

let mediaRecorder;
let audioChunks = [];
let grabando = false;

async function grabarAudio() {
  const btn = document.querySelector('.btn-audio');

  if (!grabando) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    mediaRecorder.start();
    grabando = true;

    btn.textContent = "⏹️ Detener grabación";
    btn.style.background = "#e53935";

    mediaRecorder.ondataavailable = e => {
      audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      
      audioFile = audioBlob;  // ← Guardar en variable separada
      mediaType = 'audio';

      // Preview opcional
      const preview = document.getElementById('mediaPreview');

      const url = URL.createObjectURL(audioBlob);
      
      preview.innerHTML = `<audio controls src="${url}"></audio>`;
      preview.style.display = 'block';

setTimeout(() => {
  preview.style.display = 'none';
}, 5000);

      btn.textContent = "✅ Audio listo";
      btn.style.background = "#4CAF50";

      grabando = false;
    };

  } else {
    mediaRecorder.stop();
  }
}

supabaseClient

  .on(

    {
      event: 'UPDATE',
      schema: 'public',
      table: 'reportes-fauna'
    },
    (payload) => {

  const miId = localStorage.getItem("miReporteId");

  console.log("Mi ID:", miId);
  console.log("ID que cambió:", payload.new.id);

  // 👇 SI NO ES MI REPORTE → NO HACE NADA
  if (payload.new.id != miId) return;

  const nuevoEstado = payload.new.estado;
